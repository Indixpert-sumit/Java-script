<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .status {
            font-size: 1.2em;
            color: #667eea;
            margin-bottom: 20px;
            height: 30px;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 8px;
            margin: 30px auto;
            background: #333;
            padding: 8px;
            border-radius: 10px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: white;
            border: none;
            font-size: 2.5em;
            font-weight: bold;
            cursor: pointer;
            color: #667eea;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .cell.x {
            color: #667eea;
        }

        .cell.o {
            color: #764ba2;
        }

        .cell:disabled {
            cursor: not-allowed;
        }

        .cell:disabled:hover {
            transform: scale(1);
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .reset-btn {
            background: #667eea;
            color: white;
        }

        .reset-btn:hover {
            background: #5568d3;
            transform: scale(1.05);
        }

        .reset-btn:active {
            transform: scale(0.98);
        }

        .mode-selector {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .mode-btn {
            padding: 8px 15px;
            font-size: 0.9em;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
        }

        .mode-btn.active {
            background: #667eea;
            color: white;
        }

        .score {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
        }

        .score-item {
            display: flex;
            gap: 10px;
        }

        .score-value {
            color: #667eea;
            font-size: 1.3em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Tic Tac Toe</h1>
        
        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('pvp')">Player vs Player</button>
            <button class="mode-btn" onclick="setMode('pvc')">Player vs Computer</button>
        </div>

        <div class="score">
            <div class="score-item">X: <span class="score-value" id="scoreX">0</span></div>
            <div class="score-item">Draw: <span class="score-value" id="scoreDraw">0</span></div>
            <div class="score-item">O: <span class="score-value" id="scoreO">0</span></div>
        </div>

        <div class="status" id="status">Player X's Turn</div>

        <div class="game-board" id="gameBoard">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>

        <div class="controls">
            <button class="reset-btn" onclick="resetGame()">New Game</button>
        </div>
    </div>

    <script>
        const cells = document.querySelectorAll('.cell');
        const statusDisplay = document.getElementById('status');
        const gameBoard = document.getElementById('gameBoard');
        const scoreXDisplay = document.getElementById('scoreX');
        const scoreDraw = document.getElementById('scoreDraw');
        const scoreODisplay = document.getElementById('scoreO');
        const modeBtns = document.querySelectorAll('.mode-btn');

        let gameActive = true;
        let currentPlayer = 'X';
        let gameState = ['', '', '', '', '', '', '', '', ''];
        let gameMode = 'pvp'; // Player vs Player
        let scoreX = 0;
        let scoreDraws = 0;
        let scoreO = 0;

        const winningConditions = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        function setMode(mode) {
            gameMode = mode;
            modeBtns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            resetGame();
        }

        function handleCellClick(index) {
            if (gameState[index] !== '' || !gameActive) return;

            gameState[index] = currentPlayer;
            cells[index].textContent = currentPlayer;
            cells[index].classList.add(currentPlayer.toLowerCase());

            checkGameStatus();

            if (gameMode === 'pvc' && gameActive && currentPlayer === 'X') {
                currentPlayer = 'O';
                statusDisplay.textContent = "Computer is thinking...";
                setTimeout(computerMove, 500);
            } else if (gameActive) {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                statusDisplay.textContent = `Player ${currentPlayer}'s Turn`;
            }
        }

        function checkGameStatus() {
            let roundWon = false;

            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (gameState[a] === '' || gameState[b] === '' || gameState[c] === '') {
                    continue;
                }
                if (gameState[a] === gameState[b] && gameState[b] === gameState[c]) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                statusDisplay.textContent = `🎉 Player ${currentPlayer} Wins!`;
                gameActive = false;
                if (currentPlayer === 'X') scoreX++;
                else scoreO++;
                updateScoreDisplay();
                return;
            }

            if (!gameState.includes('')) {
                statusDisplay.textContent = "🤝 It's a Draw!";
                gameActive = false;
                scoreDraws++;
                updateScoreDisplay();
                return;
            }
        }

        function computerMove() {
            const availableMoves = gameState
                .map((cell, index) => cell === '' ? index : null)
                .filter(val => val !== null);

            if (availableMoves.length === 0) return;

            // Simple AI: Check if computer can win
            for (let move of availableMoves) {
                gameState[move] = 'O';
                if (isWinning('O')) {
                    gameState[move] = 'O';
                    cells[move].textContent = 'O';
                    cells[move].classList.add('o');
                    currentPlayer = 'O';
                    checkGameStatus();
                    currentPlayer = 'X';
                    return;
                }
                gameState[move] = '';
            }

            // Check if player can win and block
            for (let move of availableMoves) {
                gameState[move] = 'X';
                if (isWinning('X')) {
                    gameState[move] = 'O';
                    cells[move].textContent = 'O';
                    cells[move].classList.add('o');
                    currentPlayer = 'O';
                    checkGameStatus();
                    currentPlayer = 'X';
                    return;
                }
                gameState[move] = '';
            }

            // Take center if available
            if (gameState[4] === '') {
                gameState[4] = 'O';
                cells[4].textContent = 'O';
                cells[4].classList.add('o');
            } else {
                // Random move
                const randomMove = availableMoves[Math.floor(Math.random() * availableMoves.length)];
                gameState[randomMove] = 'O';
                cells[randomMove].textContent = 'O';
                cells[randomMove].classList.add('o');
            }

            currentPlayer = 'O';
            checkGameStatus();
            currentPlayer = 'X';
            statusDisplay.textContent = `Player X's Turn`;
        }

        function isWinning(player) {
            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (gameState[a] === player && gameState[b] === player && gameState[c] === player) {
                    return true;
                }
            }
            return false;
        }

        function updateScoreDisplay() {
            scoreXDisplay.textContent = scoreX;
            scoreDraw.textContent = scoreDraws;
            scoreODisplay.textContent = scoreO;
        }

        function resetGame() {
            gameState = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            currentPlayer = 'X';
            statusDisplay.textContent = `Player X's Turn`;
            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('x', 'o');
            });
        }

        cells.forEach((cell, index) => {
            cell.addEventListener('click', () => handleCellClick(index));
        });
    </script>
</body>
</html>
